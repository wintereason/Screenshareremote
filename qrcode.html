<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Remote - QR Code</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 80px rgba(99,102,241,0.08);
            max-width: 420px;
            width: 90%;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #6b7280;
            margin-bottom: 32px;
        }
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: #fff;
            border-radius: 16px;
            margin-bottom: 24px;
        }
        #qrcode canvas { display: block; }
        .url-badge {
            display: inline-block;
            background: rgba(99,102,241,0.12);
            border: 1px solid rgba(99,102,241,0.25);
            padding: 8px 20px;
            border-radius: 999px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a5b4fc;
            letter-spacing: 0.02em;
        }
        .instructions {
            margin-top: 24px;
            font-size: 0.78rem;
            color: #6b7280;
            line-height: 1.6;
        }
    </style>
</head>
<body>

        <p class="instructions">
            Open the Screen Remote app on your phone<br>
            and tap "Scan QR" to connect.
        </p>
    </div>
